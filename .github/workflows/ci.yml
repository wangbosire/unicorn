# Monorepo 持续集成：默认不要求前端 UI 自动化测试；
# 以前后端单元测试、静态检查与构建作为主质量门禁。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monorepo-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm

      - name: Workspace tests
        run: pnpm test

      - name: Lint
        run: pnpm turbo run lint --filter='...@unicorn/admin' --filter='...@unicorn/api'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='...@unicorn/admin' --filter='...@unicorn/api'

      - name: Build
        run: pnpm turbo run build --filter='...@unicorn/admin' --filter='...@unicorn/api' --filter='...@unicorn/miniapp'
