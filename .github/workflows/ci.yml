# Monorepo 持续集成：并行跑「API 单测 + Admin/API 静态检查与构建」与「Admin 浏览器单测」；不含小程序（@unicorn/miniapp）。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monorepo-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm

      - name: API tests
        run: pnpm --filter @unicorn/api test

      - name: Lint
        run: pnpm turbo run lint --filter='...@unicorn/admin' --filter='...@unicorn/api'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='...@unicorn/admin' --filter='...@unicorn/api'

      - name: Build
        run: pnpm turbo run build --filter='...@unicorn/admin' --filter='...@unicorn/api'

  admin-browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm

      - name: Install Playwright (Admin)
        run: pnpm --filter @unicorn/admin run test:browser:install

      - name: Admin tests
        run: pnpm --filter @unicorn/admin test
