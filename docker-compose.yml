# 本地基础设施：MySQL + Redis
#
# 默认开发模式：
#   1. `docker compose up -d mysql redis`
#   2. 宿主机运行 API / Admin / Miniapp H5
#
# API 本地默认：
#   http://127.0.0.1:3000/api/...
#
# 数据：
#   MySQL root / root123..，库名 unicorn，宿主机端口 3306
#   Redis 宿主机端口 6380（避开宿主机常见本地 Redis 6379 冲突）

services:
  mysql:
    image: mysql:8.0
    container_name: unicorn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123..
      MYSQL_DATABASE: unicorn
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - unicorn_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-uroot',
          '-proot123..',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: unicorn-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6380:6379'
    volumes:
      - unicorn_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  unicorn_mysql_data:
  unicorn_redis_data:
